<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Aya Trading Desk</title><style>body{margin:0;font-family:Arial,sans-serif;background:#0b1020;color:#fff}.container{max-width:1100px;margin:auto;padding:40px}.card{background:#111827;border-radius:20px;padding:24px;margin-bottom:24px}h1{font-size:54px;margin:0 0 12px}.muted{color:#94a3b8}table{width:100%;border-collapse:collapse}td,th{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left}.green{color:#4ade80}.red{color:#f87171}button{background:#6d4aff;color:#fff;border:none;padding:12px 18px;border-radius:12px;cursor:pointer}input,select{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:#0f172a;color:#fff;margin-bottom:12px}#result{display:none;margin-top:16px;padding:14px;border-radius:12px;background:#0f172a}</style></head><body><div class="container"><div class="card"><h1>Aya Trading Desk</h1><p class="muted">Realtime-ready trading dashboard prototype.</p></div><div class="card"><h2>Realtime Market Snapshot</h2><table><tr><th>Ticker</th><th>Price</th><th>Status</th></tr><tr><td>NVDA</td><td id="nvda">Loading...</td><td class="green">Live</td></tr><tr><td>MSFT</td><td id="msft">Loading...</td><td class="green">Live</td></tr><tr><td>TSLA</td><td id="tsla">Loading...</td><td class="red">Volatile</td></tr></table><button id="refreshBtn">Refresh Prices</button></div><div class="card"><h2>Trade Planner</h2><form id="tradeForm"><input id="ticker" placeholder="Ticker Symbol" required><select id="direction"><option>Long</option><option>Short</option></select><input id="entry" type="number" placeholder="Entry Price" required><button type="submit">Generate Trade Plan</button></form><div id="result"></div></div></div><script>async function loadPrices(){const mock={NVDA:'223.47',MSFT:'468.30',TSLA:'177.91'};document.getElementById('nvda').innerText='$'+mock.NVDA;document.getElementById('msft').innerText='$'+mock.MSFT;document.getElementById('tsla').innerText='$'+mock.TSLA;}document.getElementById('refreshBtn').addEventListener('click',loadPrices);loadPrices();document.getElementById('tradeForm').addEventListener('submit',function(e){e.preventDefault();const ticker=document.getElementById('ticker').value.trim();const direction=document.getElementById('direction').value;const entry=parseFloat(document.getElementById('entry').value);const result=document.getElementById('result');if(!ticker||!entry||entry<=0){result.style.display='block';result.innerHTML='Invalid trade setup.';return;}const stop=(entry*0.97).toFixed(2);const tp=(entry*1.08).toFixed(2);result.style.display='block';result.innerHTML=`<strong>${ticker}</strong> (${direction})<br><br>Entry: $${entry}<br>Stop Loss: $${stop}<br>Take Profit: $${tp}`;});</script></body></html>
